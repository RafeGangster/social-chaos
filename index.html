<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOCIAL CHAOS</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper">
  <header>
    <div class="title">SOCIAL CHAOS</div>
    <div class="subtitle">real challenges. real people. no excuses.</div>
  </header>
  <div class="deck-count" id="deckCount">loading...</div>
  <div class="difficulties" id="difficulties">
    <button class="diff-btn active" data-diff="all">⚡ All</button>
    <button class="diff-btn" data-diff="easy">😬 Easy</button>
    <button class="diff-btn" data-diff="medium">🔥 Medium</button>
    <button class="diff-btn" data-diff="hard">💀 Hard</button>
  </div>
  <div class="card-area">
    <div class="card" id="card">
      <div class="idle-state">
        <div class="big-q">?</div>
        <p>Spin if you're not scared</p>
      </div>
    </div>
  </div>
  <button class="spin-btn" id="spinBtn">
    <div class="spin-inner"><span class="fire-icon">🔥</span><span>SPIN</span></div>
  </button>
  <div class="counter" id="counter">dares completed: <span>0</span></div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">// past dares</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>



<script src="script.js"></script>
</body>
</html>
